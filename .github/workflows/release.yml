name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: fmr
            asset: fmr-x86_64-unknown-linux-gnu
          - os: macos-latest
            binary: fmr
            asset: fmr-aarch64-apple-darwin
          - os: windows-latest
            binary: fmr.exe
            asset: fmr-x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Rename binary
        run: |
          mkdir dist
          cp target/release/${{ matrix.binary }} dist/${{ matrix.asset }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*